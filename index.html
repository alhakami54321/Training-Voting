let archiveState = { polls: [], searchQuery: '', sortBy: 'newest' };

window.openArchive = async function() {
  document.getElementById('root').innerHTML = `
    <div class="container">
      <div class="main-header">
        ${state.settings.logoUrl ? `<img src="${escapeHtml(state.settings.logoUrl)}" class="custom-logo" alt="logo">` : ''}
        <div class="main-header-label">لوحة تحكم المشرف</div>
        <h1 class="main-header-title">📚 أرشيف الاستبيانات</h1>
      </div>
      <div class="card"><div class="loading">جاري تحميل الاستبيانات...</div></div>
    </div>`;
  
  try {
    const snap = await db.ref('polls').once('value');
    const data = snap.val() || {};
    archiveState.polls = Object.entries(data).map(([code, poll]) => ({ code, ...migratePoll(poll) }));
    renderArchive();
  } catch (e) {
    console.error('Archive load error:', e);
    showToast('فشل تحميل الأرشيف', 'error');
  }
};

function renderArchive() {
  const s = state.settings;
  let polls = [...archiveState.polls];
  
  // Filter by search
  if (archiveState.searchQuery) {
    const q = archiveState.searchQuery.toLowerCase();
    polls = polls.filter(p => 
      (p.headerTitle || '').toLowerCase().includes(q) ||
      (p.code || '').toLowerCase().includes(q) ||
      (p.questions || []).some(qu => (qu.title || '').toLowerCase().includes(q))
    );
  }
  
  // Sort
  switch (archiveState.sortBy) {
    case 'newest': polls.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)); break;
    case 'oldest': polls.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)); break;
    case 'most-voters': polls.sort((a, b) => (b.totalVoters || 0) - (a.totalVoters || 0)); break;
    case 'most-questions': polls.sort((a, b) => (b.questions?.length || 0) - (a.questions?.length || 0)); break;
  }
  
  const totalPolls = archiveState.polls.length;
  const totalVoters = archiveState.polls.reduce((sum, p) => sum + (p.totalVoters || 0), 0);
  const totalQuestions = archiveState.polls.reduce((sum, p) => sum + (p.questions?.length || 0), 0);
  
  let listHtml = '';
  if (polls.length === 0) {
    listHtml = `
      <div class="archive-empty">
        <div class="archive-empty-icon">📭</div>
        <div style="font-size:15px;margin-bottom:8px;">${archiveState.searchQuery ? 'لا توجد نتائج مطابقة للبحث' : 'لا توجد استبيانات بعد'}</div>
        <div style="font-size:13px;color:var(--c-text-dim);">${archiveState.searchQuery ? 'جرّب كلمات بحث أخرى' : 'ابدأ بإنشاء استبيانك الأول من الصفحة الرئيسية'}</div>
      </div>`;
  } else {
    polls.forEach(p => {
      const date = p.createdAt ? new Date(p.createdAt) : null;
      const dateStr = date ? `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}` : '—';
      const timeStr = date ? `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}` : '';
      const qCount = (p.questions || []).length;
      const voterCount = p.totalVoters || 0;
      listHtml += `
        <div class="archive-item">
          <div class="archive-item-top">
            <div class="archive-item-title-block">
              <div class="archive-item-title">${escapeHtml(p.headerTitle || 'استبيان بدون عنوان')}</div>
              <div class="archive-item-code">${p.code}</div>
            </div>
          </div>
          <div class="archive-item-meta">
            <span><span class="meta-icon">📅</span> ${dateStr} ${timeStr}</span>
            <span><span class="meta-icon">❓</span> ${qCount} ${qCount === 1 ? 'سؤال' : 'أسئلة'}</span>
            <span><span class="meta-icon">👥</span> ${voterCount} ${voterCount === 1 ? 'مصوت' : 'مصوتين'}</span>
          </div>
          <div class="archive-item-actions">
            <button class="archive-action-btn" onclick="archiveOpenPoll('${p.code}')">🎛️ فتح</button>
            <button class="archive-action-btn" onclick="archiveShowResults('${p.code}')">📊 النتائج</button>
            <button class="archive-action-btn" onclick="archiveExport('${p.code}')">💾 تصدير</button>
            <button class="archive-action-btn danger" onclick="archiveDelete('${p.code}')">🗑️ حذف</button>
          </div>
        </div>`;
    });
  }
  
  document.getElementById('root').innerHTML = `
    <div class="container">
      <div class="main-header">
        ${s.logoUrl ? `<img src="${escapeHtml(s.logoUrl)}" class="custom-logo" alt="logo">` : ''}
        <div class="main-header-label">لوحة تحكم المشرف</div>
        <h1 class="main-header-title">📚 أرشيف الاستبيانات</h1>
      </div>
      
      <div class="card">
        <button class="secondary-btn" style="margin-top:0;margin-bottom:1rem;" onclick="window.location.href='${buildUrl({admin:1})}'">← العودة للرئيسية</button>
        
        <div class="archive-stats-bar">
          <div class="archive-stat"><div class="archive-stat-label">إجمالي الاستبيانات</div><div class="archive-stat-value">${totalPolls}</div></div>
          <div class="archive-stat"><div class="archive-stat-label">إجمالي المصوتين</div><div class="archive-stat-value">${totalVoters}</div></div>
          <div class="archive-stat"><div class="archive-stat-label">إجمالي الأسئلة</div><div class="archive-stat-value">${totalQuestions}</div></div>
        </div>
        
        <div class="archive-header">
          <input type="text" class="input-field archive-search" placeholder="🔍 ابحث بالعنوان أو الرمز أو السؤال..." value="${escapeHtml(archiveState.searchQuery)}" oninput="archiveSearch(this.value)" />
          <select class="archive-sort-btn" onchange="archiveSort(this.value)">
            <option value="newest" ${archiveState.sortBy === 'newest' ? 'selected' : ''}>الأحدث أولاً</option>
            <option value="oldest" ${archiveState.sortBy === 'oldest' ? 'selected' : ''}>الأقدم أولاً</option>
            <option value="most-voters" ${archiveState.sortBy === 'most-voters' ? 'selected' : ''}>الأكثر مشاركة</option>
            <option value="most-questions" ${archiveState.sortBy === 'most-questions' ? 'selected' : ''}>الأكثر أسئلة</option>
          </select>
        </div>
        
        ${listHtml}
      </div>
      
      ${s.trainerName ? `<div class="app-footer">${escapeHtml(s.trainerName)}</div>` : ''}
    </div>`;
}

window.archiveSearch = function(val) {
  archiveState.searchQuery = val;
  renderArchive();
  // Refocus input
  setTimeout(() => { 
    const inp = document.querySelector('.archive-search'); 
    if (inp) { inp.focus(); inp.setSelectionRange(val.length, val.length); }
  }, 10);
};

window.archiveSort = function(val) {
  archiveState.sortBy = val;
  renderArchive();
};

window.archiveOpenPoll = function(code) {
  window.location.href = buildUrl({ s: code, admin: 1 });
};

window.archiveShowResults = function(code) {
  const poll = archiveState.polls.find(p => p.code === code);
  if (!poll) { showToast('الاستبيان غير موجود', 'error'); return; }
  
  const totalVoters = poll.totalVoters || 0;
  const questions = poll.questions || [];
  const date = poll.createdAt ? new Date(poll.createdAt) : null;
  const dateStr = date ? `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}` : '—';
  
  let questionsHtml = '';
  if (questions.length === 0) {
    questionsHtml = '<div class="results-no-answers">لا توجد أسئلة في هذا الاستبيان</div>';
  } else {
    questions.forEach((q, qIdx) => {
      const qTotal = q.options.reduce((sum, o) => sum + (o.votes || 0), 0);
      const maxV = Math.max(...q.options.map(o => o.votes || 0), 1);
      let optsHtml = '';
      if (qTotal === 0) {
        optsHtml = '<div class="results-no-answers">لم يجب أحد على هذا السؤال</div>';
      } else {
        q.options.forEach(o => {
          const pct = Math.round(((o.votes || 0) / qTotal) * 100);
          const bw = ((o.votes || 0) / maxV) * 100;
          optsHtml += `
            <div class="result-bar-container">
              <div class="result-bar-label">
                <span class="result-bar-name">${escapeHtml(o.text)}</span>
                <span class="result-bar-stats">${o.votes || 0} · ${pct}%</span>
              </div>
              <div class="result-bar-track"><div class="result-bar-fill" style="width:${bw}%;"></div></div>
            </div>`;
        });
      }
      questionsHtml += `
        <div class="results-question-block">
          <div class="results-question-block-title">
            <div class="results-question-num">${qIdx + 1}</div>
            <div class="results-question-text">${escapeHtml(q.title)}</div>
          </div>
          ${optsHtml}
        </div>`;
    });
  }
  
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal-card results-modal-content" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:10px;">
          <div>
            <div class="modal-title">${escapeHtml(poll.headerTitle || 'نتائج الاستبيان')}</div>
            <div class="modal-subtitle">الرمز: ${code} · ${dateStr} · ${totalVoters} مصوت</div>
          </div>
          <button class="archive-action-btn" style="flex-shrink:0;" onclick="closeModal()">إغلاق ×</button>
        </div>
        ${questionsHtml}
        <div class="btn-row">
          <button class="primary-btn" style="flex:1;" onclick="archiveExportDirect('${code}', 'pdf')">📄 تصدير PDF</button>
          <button class="primary-btn" style="flex:1;background:linear-gradient(135deg,#10b981 0%,#059669 100%);" onclick="archiveExportDirect('${code}', 'excel')">📊 تصدير Excel</button>
        </div>
      </div>
    </div>`;
};

window.archiveExport = function(code) {
  const poll = archiveState.polls.find(p => p.code === code);
  if (!poll) return;
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-backdrop" onclick="closeModal(event)">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-title">تصدير "${escapeHtml(poll.headerTitle || 'الاستبيان')}"</div>
        <div class="modal-subtitle">اختر نوع التصدير</div>
        <div class="modal-option" onclick="archiveExportDirect('${code}', 'pdf')">
          <div class="modal-option-title">📄 تصدير كـ PDF</div>
          <div class="modal-option-desc">تقرير ملون احترافي — مناسب للطباعة والعرض</div>
        </div>
        <div class="modal-option" onclick="archiveExportDirect('${code}', 'excel')">
          <div class="modal-option-title">📊 تصدير كـ Excel</div>
          <div class="modal-option-desc">جداول بيانات — مناسب للتحليل الرقمي</div>
        </div>
        <button class="secondary-btn" onclick="closeModal()">إلغاء</button>
      </div>
    </div>`;
};

window.archiveExportDirect = function(code, type) {
  closeModal();
  const poll = archiveState.polls.find(p => p.code === code);
  if (!poll) return;
  // Temporarily set as current poll for export
  const prevPoll = state.pollData;
  const prevCode = state.sessionCode;
  state.pollData = poll;
  state.sessionCode = code;
  if (type === 'pdf') exportPDF('combined');
  else exportExcel('combined');
  state.pollData = prevPoll;
  state.sessionCode = prevCode;
};

window.archiveDelete = async function(code) {
  const poll = archiveState.polls.find(p => p.code === code);
  if (!poll) return;
  if (!confirm(`هل أنت متأكد من حذف الاستبيان "${poll.headerTitle || code}"؟\n\n⚠️ سيتم حذف كل النتائج والبيانات نهائياً ولا يمكن استرجاعها.`)) return;
  try {
    await db.ref('polls/' + code).remove();
    archiveState.polls = archiveState.polls.filter(p => p.code !== code);
    renderArchive();
    showToast('تم حذف الاستبيان');
  } catch (e) {
    console.error(e);
    showToast('فشل الحذف', 'error');
  }
};

// Color palette for chart colors (beautiful, print-friendly)
const CHART_COLORS = [
  '#3b82f6', // blue
  '#10b981', // emerald
  '#f59e0b', // amber
  '#ef4444', // red
  '#8b5cf6', // violet
  '#06b6d4', // cyan
  '#ec4899', // pink
  '#84cc16', // lime
  '#f97316', // orange
  '#6366f1', // indigo
  '#14b8a6', // teal
  '#a855f7'  // purple
];

function buildDonutChart(options, total, colorSet) {
  if (total === 0) {
    return `<svg width="100" height="100" viewBox="0 0 140 140"><circle cx="70" cy="70" r="55" fill="none" stroke="#e2e8f0" stroke-width="22"/><text x="70" y="75" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="600" font-family="Segoe UI, Arial">لا أصوات</text></svg>`;
  }
  
  const cx = 70, cy = 70, r = 55, strokeW = 22;
  const circumference = 2 * Math.PI * r;
  let currentOffset = 0;
  let segments = '';
  
  options.forEach((opt, i) => {
    const val = opt.votes || 0;
    if (val === 0) return;
    const pct = val / total;
    const dashLength = pct * circumference;
    const color = colorSet[i % colorSet.length];
    segments += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-dasharray="${dashLength} ${circumference}" stroke-dashoffset="${-currentOffset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    currentOffset += dashLength;
  });
  
  return `<svg width="100" height="100" viewBox="0 0 140 140"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f5f9" stroke-width="${strokeW}"/>${segments}<text x="70" y="68" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="700" font-family="Segoe UI, Arial">${total}</text><text x="70" y="85" text-anchor="middle" font-size="11" fill="#64748b" font-weight="500" font-family="Segoe UI, Arial">صوت</text></svg>`;
}

// 3D Bar chart for quiz results - shows percentage of each option with correctness highlighting
function build3DBarChart(options, total, correctAnswers, colorSet) {
  const width = 280, height = 150;
  const barCount = options.length;
  if (barCount === 0 || total === 0) {
    return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}"><text x="${width/2}" y="${height/2}" text-anchor="middle" font-size="12" fill="#94a3b8" font-weight="600" font-family="Segoe UI, Arial">لا توجد إجابات بعد</text></svg>`;
  }
  
  const hasCorrect = (correctAnswers || []).length > 0;
  const paddingLeft = 24, paddingRight = 24, paddingTop = 16, paddingBottom = hasCorrect ? 32 : 22;
  const chartW = width - paddingLeft - paddingRight;
  const chartH = height - paddingTop - paddingBottom;
  const barGap = 10;
  const barDepth = 6; // 3D depth
  const barWidth = (chartW - (barCount - 1) * barGap - barCount * barDepth) / barCount;
  
  let barsHtml = '';
  let labelsHtml = '';
  
  options.forEach((opt, i) => {
    const pct = total > 0 ? (opt.votes || 0) / total : 0;
    const barH = Math.max(pct * chartH, 2);
    const x = paddingLeft + i * (barWidth + barGap + barDepth);
    const y = paddingTop + chartH - barH;
    const isCorrect = (correctAnswers || []).includes(opt.id);
    const baseColor = isCorrect ? '#10b981' : colorSet[i % colorSet.length];
    // Darker shade for side/top 3D
    const darker = shadeColor(baseColor, -20);
    const lighter = shadeColor(baseColor, 15);
    
    // Top face (parallelogram)
    barsHtml += `<polygon points="${x},${y} ${x+barWidth},${y} ${x+barWidth+barDepth},${y-barDepth} ${x+barDepth},${y-barDepth}" fill="${lighter}" stroke="${darker}" stroke-width="0.5"/>`;
    // Right face (parallelogram)
    barsHtml += `<polygon points="${x+barWidth},${y} ${x+barWidth+barDepth},${y-barDepth} ${x+barWidth+barDepth},${y-barDepth+barH} ${x+barWidth},${y+barH}" fill="${darker}" stroke="${darker}" stroke-width="0.5"/>`;
    // Front face
    barsHtml += `<rect x="${x}" y="${y}" width="${barWidth}" height="${barH}" fill="${baseColor}" stroke="${darker}" stroke-width="0.5"/>`;
    
    // Percentage label on top of bar
    const pctText = Math.round(pct * 100) + '%';
    barsHtml += `<text x="${x + barWidth/2}" y="${y - barDepth - 3}" text-anchor="middle" font-size="11" font-weight="700" fill="${isCorrect ? '#059669' : '#334155'}" font-family="Segoe UI, Arial">${pctText}</text>`;
    
    // Correct indicator
    if (isCorrect) {
      barsHtml += `<text x="${x + barWidth/2 + barDepth/2}" y="${paddingTop + chartH + 12}" text-anchor="middle" font-size="9" font-weight="700" fill="#059669" font-family="Segoe UI, Arial">✓ صحيحة</text>`;
    }
    
    // Option label (number)
    labelsHtml += `<text x="${x + barWidth/2 + barDepth/2}" y="${paddingTop + chartH + (isCorrect ? 24 : 12)}" text-anchor="middle" font-size="9" fill="#64748b" font-weight="600" font-family="Segoe UI, Arial">${i + 1}</text>`;
  });
  
  // Ground baseline
  const groundY = paddingTop + chartH;
  const groundLine = `<line x1="${paddingLeft - 5}" y1="${groundY}" x2="${width - paddingRight + 5}" y2="${groundY}" stroke="#cbd5e1" stroke-width="1"/>`;
  const groundShadow = `<line x1="${paddingLeft - 5 + barDepth}" y1="${groundY - barDepth}" x2="${width - paddingRight + 5 + barDepth}" y2="${groundY - barDepth}" stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="2,2"/>`;
  
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="max-width:100%;">${groundShadow}${groundLine}${barsHtml}${labelsHtml}</svg>`;
}

// Helper: shade a hex color by percentage (positive=lighter, negative=darker)
function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  let r = (num >> 16) + Math.round(255 * percent / 100);
  let g = ((num >> 8) & 0x00FF) + Math.round(255 * percent / 100);
  let b = (num & 0x0000FF) + Math.round(255 * percent / 100);
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function buildPDFContent(poll, question, s, sessionCode, reportTitle) {
  const d = getFormattedDate();
  const isQuiz = poll.pollType === 'quiz';
  
  let questionsHtml = '';
  const questionsToShow = question ? [question] : (poll.questions || []);
  
  questionsToShow.forEach((q, qi) => {
    const qTotal = q.options.reduce((s, o) => s + (o.votes || 0), 0);
    const maxV = Math.max(...q.options.map(o => o.votes || 0), 1);
    const correctAnswers = q.correctAnswers || [];
    
    // Use 3D bar chart for both surveys and quizzes
    // For quiz: highlights correct answers in green. For survey: no correct answers (empty array).
    const chart = build3DBarChart(q.options, qTotal, correctAnswers, CHART_COLORS);
    
    let legend = '';
    q.options.forEach((o, i) => {
      const pct = qTotal > 0 ? Math.round(((o.votes || 0) / qTotal) * 100) : 0;
      const bw = qTotal > 0 ? ((o.votes || 0) / maxV) * 100 : 0;
      const isCorrect = isQuiz && correctAnswers.includes(o.id);
      const color = isCorrect ? '#10b981' : CHART_COLORS[i % CHART_COLORS.length];
      const correctMark = isCorrect ? '<span style="color:#059669;font-weight:700;margin-left:4px;">✓</span>' : '';
      const itemStyle = isCorrect ? 'border:1px solid rgba(16,185,129,0.4);background:#f0fdf4;' : '';
      legend += `
        <div class="legend-item" style="${itemStyle}">
          <div class="legend-row-top">
            <span class="legend-num" style="background:${color};">${i + 1}</span>
            <span class="legend-label">${correctMark}${escapeHtml(o.text)}</span>
            <span class="legend-votes">${o.votes || 0} ${(o.votes || 0) === 1 ? 'صوت' : 'أصوات'}</span>
            <span class="legend-pct" style="color:${color};">${pct}%</span>
          </div>
          <div class="legend-bar-wrap">
            <div class="legend-bar-fill" style="width:${bw}%;background:linear-gradient(90deg,${color}dd 0%,${color} 100%);"></div>
          </div>
        </div>`;
    });
    
    const qNumberDisplay = question ? '' : qi + 1;
    
    questionsHtml += `
      <div class="q-section">
        <div class="q-header">
          <div class="q-num">${qNumberDisplay}</div>
          <div class="q-title-wrap">
            <span class="q-title">${escapeHtml(q.title)}</span>
            <span class="q-meta"><span class="mini-tag">${qTotal} ${qTotal === 1 ? 'صوت' : 'أصوات'}</span></span>
          </div>
        </div>
        <div class="chart-row">
          <div class="chart-donut">${chart}</div>
          <div class="chart-legend">${legend}</div>
        </div>
      </div>`;
  });
  
  // Build aggregate summary chart for surveys/quizzes (groups identical option labels across questions)
  let aggregateHtml = '';
  if (!question && (poll.pollType === 'survey' || poll.pollType === 'quiz') && questionsToShow.length > 1) {
    // Group votes by option text (with smart Arabic-aware normalization)
    // Helper: normalize Arabic text for matching (handles spaces, diacritics, common variations)
    const normalizeArabic = (text) => {
      if (!text) return '';
      return text
        .trim()
        .toLowerCase()
        // Remove Arabic diacritics (tashkeel)
        .replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g, '')
        // Normalize Arabic letter variants
        .replace(/[إأآا]/g, 'ا')   // Different forms of alef → simple alef
        .replace(/[ىي]/g, 'ي')      // Different forms of ya
        .replace(/ة/g, 'ه')          // Ta marbuta → ha
        // Collapse multiple spaces
        .replace(/\s+/g, ' ')
        // Remove punctuation
        .replace(/[.,،؛!؟?:؛()\-_]/g, '')
        // Collapse repeated letters (3+ same letter → 1, common typo: ممتاز vs مممتاز)
        .replace(/(.)\1{2,}/g, '$1')
        .trim();
    };
    
    const aggregateMap = new Map(); // normalizedText → { displayText, totalVotes, color, questionCount }
    questionsToShow.forEach(q => {
      (q.options || []).forEach((opt, optIdx) => {
        const text = (opt.text || '').trim();
        if (!text) return;
        const key = normalizeArabic(text);
        if (!key) return;
        if (!aggregateMap.has(key)) {
          aggregateMap.set(key, {
            displayText: text,  // Keep first occurrence as display text
            totalVotes: 0,
            firstIndex: optIdx,
            questionCount: 0,
            variants: new Set()
          });
        }
        const entry = aggregateMap.get(key);
        entry.totalVotes += (opt.votes || 0);
        entry.questionCount += 1;
        entry.variants.add(text);
      });
    });
    
    // Only show aggregate if at least one option appears in 2+ questions (meaningful aggregation)
    const hasMatchingOptions = Array.from(aggregateMap.values()).some(e => e.questionCount >= 2);
    
    if (hasMatchingOptions && aggregateMap.size > 0) {
      // For each entry, pick the most common variant as display text (helps fix typos automatically)
      // If a typo is rare and the correct version is common, the correct version wins
      aggregateMap.forEach(entry => {
        if (entry.variants && entry.variants.size > 1) {
          // Count occurrences of each variant across all questions
          const variantCounts = new Map();
          questionsToShow.forEach(q => {
            (q.options || []).forEach(opt => {
              const text = (opt.text || '').trim();
              if (entry.variants.has(text)) {
                variantCounts.set(text, (variantCounts.get(text) || 0) + 1);
              }
            });
          });
          // Pick the variant that appears in most questions
          let bestVariant = entry.displayText;
          let bestCount = 0;
          variantCounts.forEach((count, variant) => {
            if (count > bestCount) {
              bestCount = count;
              bestVariant = variant;
            }
          });
          entry.displayText = bestVariant;
        }
      });
      
      // Sort by firstIndex (preserve order) and convert to array
      const aggregateArr = Array.from(aggregateMap.values())
        .sort((a, b) => a.firstIndex - b.firstIndex);
      const grandTotal = aggregateArr.reduce((sum, e) => sum + e.totalVotes, 0);
      
      // Build options-like array for build3DBarChart
      const aggregateOptions = aggregateArr.map((e, i) => ({
        id: 'agg_' + i,
        text: e.displayText,
        votes: e.totalVotes
      }));
      
      const aggregateChart = build3DBarChart(aggregateOptions, grandTotal, [], CHART_COLORS);
      
      // Build legend items for aggregate
      const maxVotes = Math.max(...aggregateArr.map(e => e.totalVotes), 1);
      let aggLegend = '';
      aggregateArr.forEach((e, i) => {
        const pct = grandTotal > 0 ? Math.round((e.totalVotes / grandTotal) * 100) : 0;
        const bw = grandTotal > 0 ? (e.totalVotes / maxVotes) * 100 : 0;
        const color = CHART_COLORS[i % CHART_COLORS.length];
        aggLegend += `
          <div class="legend-item">
            <div class="legend-row-top">
              <span class="legend-num" style="background:${color};">${i + 1}</span>
              <span class="legend-label">${escapeHtml(e.displayText)}</span>
              <span class="legend-votes">${e.totalVotes} ${e.totalVotes === 1 ? 'صوت' : 'أصوات'}</span>
              <span class="legend-pct" style="color:${color};">${pct}%</span>
            </div>
            <div class="legend-bar-wrap">
              <div class="legend-bar-fill" style="width:${bw}%;background:linear-gradient(90deg,${color}dd 0%,${color} 100%);"></div>
            </div>
          </div>`;
      });
      
      aggregateHtml = `
        <div class="aggregate-summary-section">
          <div class="aggregate-header">
            <div class="aggregate-icon">📊</div>
            <div class="aggregate-title-wrap">
              <div class="aggregate-label">الخلاصة التجميعية</div>
              <div class="aggregate-title">إجمالي الأصوات لكل خيار عبر جميع الأسئلة</div>
            </div>
          </div>
          <div class="aggregate-stats-row">
            <div class="agg-stat"><div class="agg-stat-label">عدد الأسئلة</div><div class="agg-stat-value">${questionsToShow.length}</div></div>
            <div class="agg-stat"><div class="agg-stat-label">إجمالي الأصوات</div><div class="agg-stat-value">${grandTotal}</div></div>
            <div class="agg-stat"><div class="agg-stat-label">عدد الخيارات</div><div class="agg-stat-value">${aggregateArr.length}</div></div>
          </div>
          <div class="chart-row" style="margin-top:8px;">
            <div class="chart-donut">${aggregateChart}</div>
            <div class="chart-legend">${aggLegend}</div>
          </div>
        </div>`;
    }
  }
  
  // Build quiz summary (only for quiz, only in combined reports)
  let summaryHtml = '';
  if (isQuiz && !question) {
    const voters = poll.voters || {};
    const takers = Object.values(voters).filter(v => v && typeof v.percentage === 'number');
    const totalTakers = takers.length;
    let totalCorrect = 0, totalAttempted = 0;
    takers.forEach(t => {
      totalCorrect += (t.score || 0);
      totalAttempted += (t.totalQuestions || 0);
    });
    const correctPct = totalAttempted > 0 ? Math.round((totalCorrect / totalAttempted) * 100) : 0;
    const wrongPct = totalAttempted > 0 ? 100 - correctPct : 0;
    const totalWrong = totalAttempted - totalCorrect;
    const avgScore = totalTakers > 0 ? Math.round(takers.reduce((sum, t) => sum + (t.percentage || 0), 0) / totalTakers) : 0;
    const passCount = takers.filter(t => (t.percentage || 0) >= 60).length;
    const failCount = totalTakers - passCount;
    
    // Overall performance bar (green/red split)
    const correctBarW = correctPct;
    const wrongBarW = wrongPct;
    
    summaryHtml = `
      <div class="quiz-summary-section">
        <div class="quiz-summary-header">
          <div class="quiz-summary-icon">📊</div>
          <div class="quiz-summary-title-wrap">
            <div class="quiz-summary-label">ملخص الأداء العام</div>
            <div class="quiz-summary-title">خلاصة نتائج جميع المختبرين</div>
          </div>
        </div>
        
        <div class="summary-percentage-grid">
          <div class="perc-card perc-correct">
            <div class="perc-icon">✓</div>
            <div class="perc-label">نسبة الإجابات الصحيحة</div>
            <div class="perc-value">${correctPct}%</div>
            <div class="perc-detail">${totalCorrect} من ${totalAttempted} إجابة</div>
          </div>
          <div class="perc-card perc-wrong">
            <div class="perc-icon">✗</div>
            <div class="perc-label">نسبة الإجابات غير الصحيحة</div>
            <div class="perc-value">${wrongPct}%</div>
            <div class="perc-detail">${totalWrong} من ${totalAttempted} إجابة</div>
          </div>
        </div>
        
        <div class="perc-combined-bar-wrap">
          <div class="perc-combined-bar-label">
            <span class="perc-lbl-correct">✓ صحيحة ${correctPct}%</span>
            <span class="perc-lbl-wrong">✗ غير صحيحة ${wrongPct}%</span>
          </div>
          <div class="perc-combined-bar">
            <div class="perc-bar-correct" style="width:${correctBarW}%;"></div>
            <div class="perc-bar-wrong" style="width:${wrongBarW}%;"></div>
          </div>
        </div>
        
        <div class="summary-stats-grid">
          <div class="sum-stat-card">
            <div class="sum-stat-label">المختبرون</div>
            <div class="sum-stat-value">${totalTakers}</div>
          </div>
          <div class="sum-stat-card">
            <div class="sum-stat-label">متوسط الدرجات</div>
            <div class="sum-stat-value" style="color:#3b82f6;">${avgScore}%</div>
          </div>
          <div class="sum-stat-card">
            <div class="sum-stat-label">ناجحون</div>
            <div class="sum-stat-value" style="color:#10b981;">${passCount}</div>
          </div>
          <div class="sum-stat-card">
            <div class="sum-stat-label">غير ناجحين</div>
            <div class="sum-stat-value" style="color:#ef4444;">${failCount}</div>
          </div>
        </div>
      </div>`;
  }
  
  return `<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>${escapeHtml(reportTitle)}</title>
<style>

function buildTakersReportPDF(poll, s, sessionCode) {
  const d = getFormattedDate();
  const voters = poll.voters || {};
  const takers = Object.entries(voters).filter(([_,v]) => v && v.info).map(([id, v]) => ({ id, ...v }));
  takers.sort((a, b) => (b.percentage || 0) - (a.percentage || 0));
  
  const avg = takers.length > 0 ? takers.reduce((sum, t) => sum + (t.percentage || 0), 0) / takers.length : 0;
  const passCount = takers.filter(t => (t.percentage || 0) >= 60).length;
  const failCount = takers.length - passCount;
  const highest = takers.length > 0 ? takers[0] : null;
  const lowest = takers.length > 0 ? takers[takers.length - 1] : null;
  
  let rowsHtml = '';
  takers.forEach((t, i) => {
    const pct = t.percentage || 0;
    let color = '#f59e0b', bgColor = '#fef3c7', label = 'متوسط';
    if (pct >= 90) { color = '#10b981'; bgColor = '#d1fae5'; label = 'ممتاز'; }
    else if (pct >= 80) { color = '#3b82f6'; bgColor = '#dbeafe'; label = 'جيد جداً'; }
    else if (pct >= 70) { color = '#06b6d4'; bgColor = '#cffafe'; label = 'جيد'; }
    else if (pct < 60) { color = '#ef4444'; bgColor = '#fee2e2'; label = 'لم يجتز'; }
    rowsHtml += `
      <tr>
        <td class="t-rank">${i + 1}</td>
        <td class="t-name">${escapeHtml(t.info.name || '—')}</td>
        <td class="t-dept">${escapeHtml(t.info.department || '—')}</td>
        <td class="t-phone">${escapeHtml(t.info.phone || '—')}</td>
        <td class="t-score-cell">
          <div class="t-score-wrap">
            <div class="t-score-bar-wrap"><div class="t-score-bar" style="width:${pct}%;background:${color};"></div></div>
            <span class="t-score-value" style="color:${color};">${pct}%</span>
          </div>
        </td>
        <td class="t-grade-cell"><span class="t-grade" style="background:${bgColor};color:${color};">${label}</span></td>
        <td class="t-details">${t.score || 0}/${t.totalQuestions || 0}</td>
      </tr>`;
  });
  
  return `<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>تقرير المختبرين</title>
<style>

.header::before{content:'';position:absolute;top:-40%;right:-10%;width:120px;height:120px;background:rgba(255,255,255,0.08);border-radius:50%;}
.header .label{font-size:10px;opacity:.85;margin-bottom:4px;letter-spacing:1.5px;position:relative;z-index:1;font-weight:500;}
.header h1{font-size:18px;font-weight:600;position:relative;z-index:1;line-height:1.4;}
.header .meta{font-size:10px;opacity:.8;margin-top:6px;position:relative;z-index:1;letter-spacing:0.5px;}
.summary{display:grid;grid-template-columns:repeat(4, 1fr);gap:8px;margin-bottom:14px;}
.sum-card{background:linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%);border:1px solid #e2e8f0;border-radius:8px;padding:10px;text-align:center;}
.sum-label{font-size:9px;color:#64748b;font-weight:600;margin-bottom:2px;letter-spacing:0.5px;text-transform:uppercase;}
.sum-value{font-size:18px;font-weight:700;color:#0f172a;line-height:1.1;}

function buildWorkshopPDF(poll, s, sessionCode) {
  const d = getFormattedDate();
  
  // Get user's custom colors (or fallback to defaults)
  const primary = (s.useCustomColors && s.customPrimary) ? s.customPrimary : (COLOR_PRESETS[s.colorPreset]?.primary || '#1e5fc9');
  const accent = (s.useCustomColors && s.customAccent) ? s.customAccent : (COLOR_PRESETS[s.colorPreset]?.accent || '#0ea5b5');
  // Lighter tints for backgrounds (PDFs always have light backgrounds for readability)
  const primaryLight = lightenColor(primary, 75);
  const accentLight = lightenColor(accent, 75);
  const primaryDark = lightenColor(primary, -15);
  const primaryBorder = lightenColor(primary, 35);
  
  const voters = poll.voters || {};
  const groups = Object.entries(voters)
    .filter(([_, v]) => v && v.info)
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (a.firstSubmittedAt || a.at || 0) - (b.firstSubmittedAt || b.at || 0));
  
  const questions = poll.questions || [];
  
  let groupsHtml = '';
  
  if (groups.length === 0) {
    groupsHtml = `
      <div class="empty-workshop">
        <div class="empty-icon">🛠️</div>
        <div class="empty-title">لم تشارك أي مجموعة بعد</div>
        <div class="empty-desc">في انتظار إرسال المجموعات لإجاباتها</div>
      </div>`;
  } else {
    groups.forEach((g, gi) => {
      const info = g.info || {};
      const submittedDate = g.firstSubmittedAt ? new Date(g.firstSubmittedAt) : (g.at ? new Date(g.at) : null);
      const submittedStr = submittedDate ? `${String(submittedDate.getDate()).padStart(2,'0')}/${String(submittedDate.getMonth()+1).padStart(2,'0')}/${submittedDate.getFullYear()} - ${String(submittedDate.getHours()).padStart(2,'0')}:${String(submittedDate.getMinutes()).padStart(2,'0')}` : '';
      const wasEdited = g.editedAt && g.firstSubmittedAt && g.editedAt !== g.firstSubmittedAt;
      
      let axesHtml = '';
      questions.forEach((q, qi) => {
        const ans = g.answers && g.answers[q.id];
        const answerType = q.answerType || 'text';
        let answerHtml = '<div class="ws-no-answer">— لم تجب المجموعة على هذا المحور —</div>';
        
        if (ans) {
          if (typeof ans === 'string' && ans.trim()) {
            answerHtml = `<div class="ws-text-answer">${escapeHtml(ans)}</div>`;
          } else if (Array.isArray(ans) && ans.length > 0) {
            const validItems = ans.filter(item => item && item.trim());
            if (validItems.length > 0) {
              answerHtml = '<ol class="ws-multi-answer">' +
                validItems.map(item => `<li>${escapeHtml(item)}</li>`).join('') + '</ol>';
            }
          }
        }
        
        axesHtml += `
          <div class="ws-axis">
            <div class="ws-axis-header">
              <div class="ws-axis-num">${qi + 1}</div>
              <div class="ws-axis-info">
                <div class="ws-axis-title">${escapeHtml(q.title)}</div>
                <span class="ws-axis-badge ${answerType === 'multi-items' ? 'multi' : 'text'}">${answerType === 'multi-items' ? '📋 بنود متعددة' : '📝 إجابة نصية'}</span>
              </div>
            </div>
            ${answerHtml}
            <div class="ws-comment-area">
              <div class="ws-comment-label">📝 تعليق المُيسّر / ملاحظات:</div>
              <div class="ws-comment-lines"></div>
            </div>
          </div>`;
      });
      
      const metaParts = [];
      if (info.membersCount) metaParts.push(`<span class="ws-meta-item">👥 <strong>${escapeHtml(String(info.membersCount))}</strong> أعضاء</span>`);
      if (info.leader) metaParts.push(`<span class="ws-meta-item">👤 قائد: <strong>${escapeHtml(info.leader)}</strong></span>`);
      if (submittedStr) metaParts.push(`<span class="ws-meta-item">📅 ${submittedStr}</span>`);
      if (wasEdited) metaParts.push(`<span class="ws-meta-item ws-edited">✏️ معدّلة</span>`);
      
      groupsHtml += `
        <div class="ws-group-page">
          <div class="ws-group-hero">
            <div class="ws-group-rank">المجموعة ${gi + 1} من ${groups.length}</div>
            <div class="ws-group-name">${escapeHtml(info.groupName || 'مجموعة بدون اسم')}</div>
            ${metaParts.length ? `<div class="ws-group-meta">${metaParts.join('<span class="ws-sep">·</span>')}</div>` : ''}
          </div>
          
          <div class="ws-group-content">
            ${axesHtml}
          </div>
        </div>`;
    });
  }
  
  return `<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><title>تقرير ورشة العمل</title>

function exportPDF(mode) {
  try {
    const poll = state.pollData;
    const s = state.settings;
    const isQuiz = poll.pollType === 'quiz';
    const isWorkshop = poll.pollType === 'workshop';
    
    // Workshop has only one PDF mode: groups-based report
    if (isWorkshop) {
      const w = window.open('', '_blank', 'width=900,height=700');
      if (!w) { showToast('اسمح بالنوافذ المنبثقة', 'error'); return; }
      w.document.write(buildWorkshopPDF(poll, s, state.sessionCode));
      w.document.close();
      showToast('تم فتح نافذة الطباعة');
      return;
    }
    
    if (mode === 'combined') {
      const w = window.open('', '_blank', 'width=900,height=700');
      if (!w) { showToast('اسمح بالنوافذ المنبثقة', 'error'); return; }
      w.document.write(buildPDFContent(poll, null, s, state.sessionCode, isQuiz ? 'تقرير نتائج الاختبار الشامل' : 'تقرير نتائج الاستبيان الشامل'));
      w.document.close();
      showToast('تم فتح نافذة الطباعة');
    } else if (mode === 'takers') {
      const w = window.open('', '_blank', 'width=900,height=700');
      if (!w) { showToast('اسمح بالنوافذ المنبثقة', 'error'); return; }
      w.document.write(buildTakersReportPDF(poll, s, state.sessionCode));
      w.document.close();
      showToast('تم فتح نافذة الطباعة');
    } else {
      const questions = poll.questions || [];
      questions.forEach((q, i) => {
        setTimeout(() => {
          const w = window.open('', '_blank', 'width=900,height=700');
          if (!w) { if (i === 0) showToast('اسمح بالنوافذ المنبثقة', 'error'); return; }
          w.document.write(buildPDFContent(poll, q, s, state.sessionCode, `نتائج السؤال ${i + 1}`));
          w.document.close();
        }, i * 500);
      });
      showToast(`سيتم فتح ${questions.length} نوافذ طباعة`);
    }
  } catch (e) { console.error(e); showToast('حدث خطأ', 'error'); }
}

function exportExcel(mode) {
  try {
    if (typeof XLSX === 'undefined') { showToast('المكتبة لم تُحمّل بعد', 'error'); return; }
    const poll = state.pollData;
    const s = state.settings;
    const d = getFormattedDate();
    const totalVoters = poll.totalVoters || 0;
    const isQuiz = poll.pollType === 'quiz';
    const isWorkshop = poll.pollType === 'workshop';
    
    // Workshop Excel: one sheet per group + summary
    if (isWorkshop || mode === 'workshop') {
      const voters = poll.voters || {};
      const groups = Object.entries(voters)
        .filter(([_, v]) => v && v.info)
        .map(([id, v]) => ({ id, ...v }))
        .sort((a, b) => (a.firstSubmittedAt || a.at || 0) - (b.firstSubmittedAt || b.at || 0));
      const questions = poll.questions || [];
      
      const wb = XLSX.utils.book_new();
      wb.Workbook = { Views: [{ RTL: true }] };
      
      // Summary sheet
      const summaryRows = [
        ['تقرير ورشة العمل'], [],
        ['عنوان الورشة', poll.headerTitle || 'ورشة عمل'],
        ['رمز الجلسة', state.sessionCode],
        ['عدد المجموعات', groups.length],
        ['عدد المحاور', questions.length],
        ['تاريخ التصدير', d.full]
      ];
      if (s.trainerName) summaryRows.push(['المدرب/المشرف', s.trainerName]);
      summaryRows.push([]);
      summaryRows.push(['#', 'اسم المجموعة', 'عدد الأعضاء', 'قائد المجموعة', 'تاريخ الإرسال', 'معدّلة']);
      groups.forEach((g, i) => {
        const info = g.info || {};
        const submittedDate = g.firstSubmittedAt ? new Date(g.firstSubmittedAt) : (g.at ? new Date(g.at) : null);
        const submittedStr = submittedDate ? `${String(submittedDate.getDate()).padStart(2,'0')}/${String(submittedDate.getMonth()+1).padStart(2,'0')}/${submittedDate.getFullYear()} ${String(submittedDate.getHours()).padStart(2,'0')}:${String(submittedDate.getMinutes()).padStart(2,'0')}` : '—';
        const wasEdited = g.editedAt && g.firstSubmittedAt && g.editedAt !== g.firstSubmittedAt;
        summaryRows.push([
          i + 1, info.groupName || '—', info.membersCount || '—',
          info.leader || '—', submittedStr, wasEdited ? 'نعم' : 'لا'
        ]);
      });
      const wsSum = XLSX.utils.aoa_to_sheet(summaryRows);
      wsSum['!cols'] = [{wch:6},{wch:30},{wch:12},{wch:25},{wch:20},{wch:10}];
      wsSum['!merges'] = [{s:{r:0,c:0},e:{r:0,c:5}}];
      wsSum['!sheetView'] = [{RTL:true}];
      XLSX.utils.book_append_sheet(wb, wsSum, 'الملخص');
      
      // One sheet per group with all axes
      groups.forEach((g, gi) => {
        const info = g.info || {};
        const groupRows = [
          [`المجموعة ${gi + 1}: ${info.groupName || '—'}`], [],
          ['اسم المجموعة', info.groupName || '—'],
          ['عدد الأعضاء', info.membersCount || '—'],
          ['قائد المجموعة', info.leader || '—'], []
        ];
        questions.forEach((q, qi) => {
          groupRows.push([`المحور ${qi + 1}: ${q.title}`]);
          const ans = g.answers && g.answers[q.id];
          if (!ans) {
            groupRows.push(['(لم تجب المجموعة على هذا المحور)']);
          } else if (typeof ans === 'string') {
            groupRows.push([ans]);
          } else if (Array.isArray(ans)) {
            ans.forEach((item, idx) => {
              if (item && item.trim()) groupRows.push([`${idx + 1}. ${item}`]);
            });
          }
          groupRows.push([]);
        });
        const ws = XLSX.utils.aoa_to_sheet(groupRows);
        ws['!cols'] = [{wch:80}];
        ws['!sheetView'] = [{RTL:true}];
        // Sanitize sheet name (Excel limit 31 chars, no special chars)
        let sheetName = (info.groupName || `مجموعة ${gi+1}`).substring(0, 28).replace(/[\\/*?:[\]]/g, '');
        if (!sheetName.trim()) sheetName = `مجموعة ${gi+1}`;
        // Ensure unique name
        let finalName = sheetName, counter = 2;
        while (wb.SheetNames.includes(finalName)) {
          finalName = sheetName.substring(0, 25) + ` (${counter})`;
          counter++;
        }
        XLSX.utils.book_append_sheet(wb, ws, finalName);
      });
      
      XLSX.writeFile(wb, `ورشة_${d.file}.xlsx`);
      showToast('تم تصدير تقرير الورشة');
      return;
    }
    
    // New: takers report (quiz only)
    if (mode === 'takers') {
      const voters = poll.voters || {};
      const takers = Object.values(voters).filter(v => v && v.info);
      takers.sort((a, b) => (b.percentage || 0) - (a.percentage || 0));
      
      const rows = [
        ['تقرير المختبرين التفصيلي'], [],
        ['الاستبيان', poll.headerTitle || s.defaultHeader],
        ['رمز الجلسة', state.sessionCode],
        ['عدد المختبرين', takers.length],
        ['تاريخ التصدير', d.full], []
      ];
      if (s.trainerName) rows.splice(5, 0, ['المدرب', s.trainerName]);
      rows.push(['الترتيب', 'الاسم', 'الإدارة/القسم', 'الجوال', 'البريد', 'الدرجة', 'المجموع', 'النسبة %', 'التقدير']);
      takers.forEach((t, i) => {
        const pct = t.percentage || 0;
        let grade = 'متوسط';
        if (pct >= 90) grade = 'ممتاز';
        else if (pct >= 80) grade = 'جيد جداً';
        else if (pct >= 70) grade = 'جيد';
        else if (pct >= 60) grade = 'مقبول';
        else grade = 'لم يجتز';
        rows.push([i + 1, t.info.name || '—', t.info.department || '—', t.info.phone || '—', t.info.email || '—', t.score || 0, t.totalQuestions || 0, pct + '%', grade]);
      });
      
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{wch:8},{wch:25},{wch:25},{wch:15},{wch:25},{wch:10},{wch:10},{wch:12},{wch:12}];
      ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:8}}];
      ws['!sheetView'] = [{RTL:true}];
      const wb = XLSX.utils.book_new();
      wb.Workbook = { Views: [{ RTL: true }] };
      XLSX.utils.book_append_sheet(wb, ws, 'المختبرون');
      XLSX.writeFile(wb, `تقرير_المختبرين_${d.file}.xlsx`);
      showToast('تم تصدير التقرير');
      return;
    }
    
    if (mode === 'combined') {
      // Single file with multiple sheets
      const wb = XLSX.utils.book_new();
      wb.Workbook = { Views: [{ RTL: true }] };
      
      // Summary sheet
      const summary = [
        [isQuiz ? 'تقرير نتائج الاختبار الشامل' : 'تقرير نتائج الاستبيان الشامل'], [],
        ['العنوان الرئيسي', poll.headerTitle || s.defaultHeader],
        ['رمز الجلسة', state.sessionCode],
        [isQuiz ? 'عدد المختبرين' : 'عدد المصوتين', totalVoters],
        ['عدد الأسئلة', (poll.questions || []).length],
        ['تاريخ التصدير', d.full]
      ];
      if (s.trainerName) summary.push(['المدرب/المشرف', s.trainerName]);
      const wsSum = XLSX.utils.aoa_to_sheet(summary);
      wsSum['!cols'] = [{wch:20},{wch:40}];
      wsSum['!merges'] = [{s:{r:0,c:0},e:{r:0,c:1}}];
      wsSum['!sheetView'] = [{RTL:true}];
      XLSX.utils.book_append_sheet(wb, wsSum, 'ملخص عام');
      
      // One sheet per question
      (poll.questions || []).forEach((q, qi) => {
        const qTotal = q.options.reduce((sum, o) => sum + (o.votes || 0), 0);
        const rows = [
          [`السؤال ${qi + 1}: ${q.title}`], [],
          ['نوع التصويت', q.voteType === 'multi' ? 'اختيارات متعددة' : 'اختيار واحد'],
          ['الإلزامية', q.required ? 'إلزامي' : 'اختياري'],
          ['إجمالي الأصوات', qTotal], [],
          ['#', 'البند', 'عدد الأصوات', 'النسبة']
        ];
        q.options.forEach((o, i) => {
          const pct = qTotal > 0 ? Math.round(((o.votes || 0) / qTotal) * 100) : 0;
          rows.push([i + 1, o.text, o.votes || 0, pct + '%']);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{wch:6},{wch:35},{wch:15},{wch:15}];
        ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:3}}];
        ws['!sheetView'] = [{RTL:true}];
        const sheetName = `س${qi + 1}`.substring(0, 30);
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
      });
      
      XLSX.writeFile(wb, `تقرير_الاستبيان_${d.file}.xlsx`);
      showToast('تم تصدير الملف');
    } else {
      // Separate files
      const questions = poll.questions || [];
      questions.forEach((q, qi) => {
        const qTotal = q.options.reduce((sum, o) => sum + (o.votes || 0), 0);
        const rows = [
          [`نتائج السؤال ${qi + 1}`], [],
          ['العنوان الرئيسي', poll.headerTitle || s.defaultHeader],
          ['رمز الجلسة', state.sessionCode],
          ['نص السؤال', q.title],
          ['نوع التصويت', q.voteType === 'multi' ? 'اختيارات متعددة' : 'اختيار واحد'],
          ['الإلزامية', q.required ? 'إلزامي' : 'اختياري'],
          ['إجمالي الأصوات', qTotal],
          [isQuiz ? 'عدد المختبرين الكلي' : 'عدد المصوتين الكلي', totalVoters],
          ['تاريخ التصدير', d.full], [],
          ['#', 'البند', 'عدد الأصوات', 'النسبة']
        ];
        q.options.forEach((o, i) => {
          const pct = qTotal > 0 ? Math.round(((o.votes || 0) / qTotal) * 100) : 0;
          rows.push([i + 1, o.text, o.votes || 0, pct + '%']);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{wch:6},{wch:40},{wch:15},{wch:15}];
        ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:3}}];
        ws['!sheetView'] = [{RTL:true}];
        const wb = XLSX.utils.book_new();
        wb.Workbook = { Views: [{ RTL: true }] };
        XLSX.utils.book_append_sheet(wb, ws, 'النتائج');
        XLSX.writeFile(wb, `سؤال_${qi + 1}_${d.file}.xlsx`);
      });
      showToast(`تم تصدير ${questions.length} ملفات`);
    }
  } catch (e) { console.error(e); showToast('حدث خطأ', 'error'); }
}
